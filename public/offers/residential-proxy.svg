<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <filter id="glowE" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feColorMatrix
        type="matrix"
        values="0 0 0 0 0.203  0 0 0 0 0.922  0 0 0 0 0.698  0 0 0 1 0"
        result="color"
      />
      <feMerge>
        <feMergeNode in="color" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowC" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feColorMatrix
        type="matrix"
        values="0 0 0 0 0.133  0 0 0 0 0.824  0 0 0 0 0.977  0 0 0 1 0"
        result="color"
      />
      <feMerge>
        <feMergeNode in="color" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- globe mesh -->
  <g filter="url(#glowC)" opacity="0.95">
    <circle cx="128" cy="124" r="74" stroke="#22d3ee" stroke-width="4" opacity="0.85"/>
    <ellipse cx="128" cy="124" rx="74" ry="32" stroke="#34d399" stroke-width="3" opacity="0.8"/>
    <path d="M54 124 C78 92, 106 76, 128 76 C150 76, 178 92, 202 124" stroke="#22d3ee" stroke-width="3" opacity="0.7" fill="none"/>
    <path d="M54 124 C78 156, 106 172, 128 172 C150 172, 178 156, 202 124" stroke="#34d399" stroke-width="3" opacity="0.7" fill="none"/>

    <!-- nodes -->
    <circle cx="128" cy="66" r="6" fill="#34d399" />
    <circle cx="172" cy="96" r="6" fill="#22d3ee" />
    <circle cx="84" cy="96" r="6" fill="#22d3ee" />
    <circle cx="104" cy="156" r="6" fill="#34d399" />
    <circle cx="152" cy="156" r="6" fill="#22d3ee" />

    <!-- connections -->
    <path d="M128 66 L172 96 L152 156 L104 156 L84 96 Z" stroke="#22d3ee" stroke-width="2.5" opacity="0.55" fill="none"/>
    <path d="M128 66 C112 98, 96 116, 84 96" stroke="#34d399" stroke-width="2.5" opacity="0.5" fill="none"/>
    <path d="M172 96 C162 120, 150 138, 152 156" stroke="#34d399" stroke-width="2.5" opacity="0.5" fill="none"/>
  </g>

  <!-- home/router silhouettes -->
  <g filter="url(#glowE)">
    <path d="M66 190 L86 170 H102 L122 190 V210 H66 Z" stroke="#34d399" stroke-width="3" opacity="0.75"/>
    <rect x="92" y="184" width="18" height="26" rx="4" stroke="#22d3ee" stroke-width="3" opacity="0.75"/>
    <path d="M154 180 C160 166, 172 160, 186 165 C200 170, 200 188, 190 196 C180 204, 164 196, 154 180 Z" stroke="#34d399" stroke-width="3" opacity="0.65" fill="none"/>
  </g>
</svg>

