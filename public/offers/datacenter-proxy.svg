    <circle cx="102" cy="136" r="4" fill="#22c55e" opacity="0.95"/>
    <circle cx="122" cy="136" r="4" fill="#22d3ee" opacity="0.95"/>
    <circle cx="142" cy="136" r="4" fill="#22c55e" opacity="0.95"/>
  </g>

  <!-- nodes -->
  <g filter="url(#glowC)">
    <circle cx="60" cy="58" r="6" fill="#22d3ee" opacity="0.95"/>
    <circle cx="128" cy="44" r="6" fill="#34d399" opacity="0.95"/>
    <circle cx="196" cy="58" r="6" fill="#22d3ee" opacity="0.95"/>
    <circle cx="44" cy="146" r="6" fill="#34d399" opacity="0.95"/>
